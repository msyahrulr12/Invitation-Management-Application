# ==============================================================================
# Nginx Configuration — Invitation Management Application
# Reverse proxy for PHP-FPM with security hardening
# ==============================================================================

server {
    listen 80;
    server_name localhost;

    # Hide Nginx version in response headers
    server_tokens off;

    # Laravel public directory as web root
    root /var/www/html/public;
    index index.php index.html;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "frame-ancestors 'self';" always;

    # ── Upload Size Limit ────────────────────────────────────────────────────
    client_max_body_size 50M;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Laravel Routing ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM Handling ─────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeout settings for long-running requests
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
    }

    # ── Static Assets Caching ────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Re-add security headers (add_header in nested blocks overrides parent)
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Deny Access to Hidden Files (.env, .git, etc.) ───────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny Access to Sensitive Files ───────────────────────────────────────
    location ~* (composer\.(json|lock)|package\.json|package-lock\.json|\.gitignore)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/app_access.log;
    error_log  /var/log/nginx/app_error.log warn;
}