# ==============================================================================
# Docker Compose — Invitation Management Application
# Services: PHP-FPM App, Nginx Reverse Proxy, PostgreSQL 16
# ==============================================================================

services:

  # ── PHP-FPM Application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: invitation_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: invitation_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network
    depends_on:
      - app

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: invitation_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bagi_invitation}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-bagi_invitation}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge